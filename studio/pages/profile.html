<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amit Studio | Profile</title>
  <link rel="stylesheet" href="../../shared/css/design-system.css" />
  <link rel="stylesheet" href="../../shared/css/components.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="studio-layout">
    <aside class="sidebar">
      <div class="navbar-logo" style="margin-bottom: var(--space-lg);">Amit<span style="color: var(--color-accent);">Studio</span></div>
      <nav>
        <a href="../index.html" class="sidebar-item">📊 Dashboard</a>
        <a href="profile.html" class="sidebar-item active">👤 Profile</a>
        <a href="projects.html" class="sidebar-item">💼 Projects</a>
        <a href="skills.html" class="sidebar-item">🧠 Skills</a>
        <a href="certificates.html" class="sidebar-item">🎓 Certificates</a>
        <a href="resume.html" class="sidebar-item">📄 Resume</a>
        <a href="gallery.html" class="sidebar-item">🖼️ Gallery</a>
        <a href="videos.html" class="sidebar-item">🎬 Videos</a>
        <a href="blog.html" class="sidebar-item">📝 Blog</a>
        <a href="analytics.html" class="sidebar-item">📈 Analytics</a>
        <a href="theme.html" class="sidebar-item">🎨 Theme</a>
        <a href="settings.html" class="sidebar-item">⚙️ Settings</a>
      </nav>
    </aside>

    <div class="studio-main">
      <header class="navbar studio-topbar">
        <div><h2 style="margin:0;">Profile</h2></div>
        <div style="display:flex; align-items:center; gap: var(--space-md);">
          <div class="text-muted text-mono" id="studio-date"></div>
          <button type="button" class="btn btn-outline" id="logout-btn">🚪 Logout</button>
        </div>
      </header>

      <main class="studio-content">
        <p class="text-muted" id="profile-status" style="margin-bottom: var(--space-lg);">Loading profile data...</p>

        <form id="profile-form">
          <div class="card" style="margin-bottom: var(--space-lg);">
            <h3 class="card-title">Basic Info</h3>
            <div class="form-grid">
              <label class="form-field"><span>Full Name</span><input type="text" id="field-name" /></label>
              <label class="form-field"><span>Title</span><input type="text" id="field-title" /></label>
              <label class="form-field"><span>Role</span><input type="text" id="field-role" /></label>
              <label class="form-field form-field-wide"><span>Tagline</span><input type="text" id="field-tagline" /></label>
            </div>
          </div>

          <div class="card" style="margin-bottom: var(--space-lg);">
            <h3 class="card-title">About</h3>
            <div class="form-grid">
              <label class="form-field form-field-wide"><span>Introduction</span><textarea id="field-introduction" rows="3"></textarea></label>
              <label class="form-field"><span>Education</span><input type="text" id="field-education" /></label>
              <label class="form-field"><span>Experience</span><input type="text" id="field-experience" /></label>
              <label class="form-field form-field-wide"><span>Goals</span><input type="text" id="field-goals" /></label>
              <label class="form-field form-field-wide">
                <span>Achievements (one per line)</span>
                <textarea id="field-achievements" rows="4" placeholder="Won XYZ Hackathon 2025&#10;Completed Google AI Certification&#10;Built 5+ live projects"></textarea>
              </label>
            </div>
          </div>

          <div class="card" style="margin-bottom: var(--space-lg);">
            <h3 class="card-title">Contact</h3>
            <div class="form-grid">
              <label class="form-field"><span>Email</span><input type="email" id="field-email" /></label>
              <label class="form-field"><span>Phone</span><input type="text" id="field-phone" /></label>
              <label class="form-field form-field-wide"><span>Location</span><input type="text" id="field-location" /></label>
            </div>
          </div>

          <div class="card" style="margin-bottom: var(--space-lg);">
            <h3 class="card-title">Links (up to 15 — real icon auto-detected)</h3>
            <div id="social-links-list" style="display:flex; flex-direction:column; gap: var(--space-sm); margin-bottom: var(--space-md);"></div>
            <button type="button" class="btn btn-outline" id="add-social-link-btn">+ Add Link</button>
          </div>

          <div class="card" style="margin-bottom: var(--space-lg);">
            <h3 class="card-title">Files & Images</h3>
            <div class="form-grid">
              <label class="form-field"><span>Resume Path</span><input type="text" id="field-resume" /></label>
              <label class="form-field"><span>Profile Photo (About section)</span><input type="text" id="field-photo" /></label>
              <label class="form-field"><span>Logo URL (Navbar)</span><input type="text" id="field-logo" /></label>
              <label class="form-field"><span>Hero Background Image URL</span><input type="text" id="field-hero-bg" /></label>
            </div>
          </div>

          <button type="submit" class="btn btn-primary">💾 Save Changes</button>
        </form>
      </main>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/profile.js"></script>
</body>
</html>
