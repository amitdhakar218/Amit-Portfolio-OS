<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amit Studio | Blog</title>
  <meta name="description" content="Amit Studio — manage portfolio blog articles." />

  <link rel="stylesheet" href="../../shared/css/design-system.css" />
  <link rel="stylesheet" href="../../shared/css/components.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <div class="studio-layout">

    <aside class="sidebar">
      <div class="navbar-logo" style="margin-bottom: var(--space-lg);">Amit<span style="color: var(--color-accent);">Studio</span></div>
      <nav>
        <a href="../index.html" class="sidebar-item">📊 Dashboard</a>
        <a href="profile.html" class="sidebar-item">👤 Profile</a>
        <a href="projects.html" class="sidebar-item">💼 Projects</a>
        <a href="skills.html" class="sidebar-item">🧠 Skills</a>
        <a href="certificates.html" class="sidebar-item">🎓 Certificates</a>
        <a href="resume.html" class="sidebar-item">📄 Resume</a>
        <a href="gallery.html" class="sidebar-item">🖼️ Gallery</a>
        <a href="videos.html" class="sidebar-item">🎬 Videos</a>
        <a href="blog.html" class="sidebar-item active">📝 Blog</a>
        <a href="analytics.html" class="sidebar-item">📈 Analytics</a>
        <a href="theme.html" class="sidebar-item">🎨 Theme</a>
        <a href="settings.html" class="sidebar-item">⚙️ Settings</a>
      </nav>
    </aside>

    <div class="studio-main">

      <header class="navbar studio-topbar">
        <div><h2 style="margin:0;">Blog</h2></div>
        <div style="display:flex; align-items:center; gap: var(--space-md);">
          <div class="text-muted text-mono" id="studio-date"></div>
          <button type="button" class="btn btn-outline" id="logout-btn">🚪 Logout</button>
        </div>
      </header>

      <main class="studio-content">
        <p class="text-muted" id="blog-status" style="margin-bottom: var(--space-lg);">Loading articles...</p>

        <div class="card" style="margin-bottom: var(--space-lg);">
          <h3 class="card-title" id="blog-form-title">Create New Article</h3>
          <form id="blog-form">
            <input type="hidden" id="field-blog-id" />
            <div class="form-grid">
              <label class="form-field form-field-wide">
                <span>Title</span>
                <input type="text" id="field-blog-title" required />
              </label>
              <label class="form-field form-field-wide">
                <span>Content</span>
                <textarea id="field-blog-content" rows="4" required></textarea>
              </label>
              <label class="form-field">
                <span>Date</span>
                <input type="text" id="field-blog-date" placeholder="e.g. July 2026" />
              </label>
            </div>
            <div class="hero-buttons" style="justify-content: flex-start; margin-top: var(--space-md);">
              <button type="submit" class="btn btn-primary" id="blog-submit-btn">+ Create Article</button>
              <button type="button" class="btn btn-outline" id="blog-cancel-btn" style="display:none;">Cancel Edit</button>
            </div>
          </form>
        </div>

        <h3 class="card-title" style="margin-bottom: var(--space-md);">Existing Articles</h3>
        <div class="blog-grid stagger-grid" id="studio-blog-grid">
          <!-- Rendered by blog.js -->
        </div>
      </main>

    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/blog.js"></script>
</body>
</html>
