<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amit Studio | Theme</title>
  <meta name="description" content="Amit Studio — customize theme colors and fonts." />

  <link rel="stylesheet" href="../../shared/css/design-system.css" />
  <link rel="stylesheet" href="../../shared/css/components.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <div class="studio-layout">

    <aside class="sidebar">
      <div class="navbar-logo" style="margin-bottom: var(--space-lg);">Amit<span style="color: var(--color-accent);">Studio</span></div>
      <nav>
        <a href="../index.html" class="sidebar-item">📊 Dashboard</a>
        <a href="profile.html" class="sidebar-item">👤 Profile</a>
        <a href="projects.html" class="sidebar-item">💼 Projects</a>
        <a href="skills.html" class="sidebar-item">🧠 Skills</a>
        <a href="certificates.html" class="sidebar-item">🎓 Certificates</a>
        <a href="resume.html" class="sidebar-item">📄 Resume</a>
        <a href="gallery.html" class="sidebar-item">🖼️ Gallery</a>
        <a href="videos.html" class="sidebar-item">🎬 Videos</a>
        <a href="blog.html" class="sidebar-item">📝 Blog</a>
        <a href="analytics.html" class="sidebar-item">📈 Analytics</a>
        <a href="theme.html" class="sidebar-item active">🎨 Theme</a>
        <a href="settings.html" class="sidebar-item">⚙️ Settings</a>
      </nav>
    </aside>

    <div class="studio-main">

      <header class="navbar studio-topbar">
        <div><h2 style="margin:0;">Theme</h2></div>
        <div style="display:flex; align-items:center; gap: var(--space-md);">
          <div class="text-muted text-mono" id="studio-date"></div>
          <button type="button" class="btn btn-outline" id="logout-btn">🚪 Logout</button>
        </div>
      </header>

      <main class="studio-content">
        <p class="text-muted" id="theme-status" style="margin-bottom: var(--space-lg);">Adjust colors and fonts — changes preview live in this session.</p>

        <div class="card" style="margin-bottom: var(--space-lg);">
          <h3 class="card-title">Mode</h3>
          <div class="hero-buttons" style="justify-content: flex-start; margin-top: var(--space-md);">
            <button type="button" class="btn btn-primary" id="theme-dark-btn">🌙 Dark</button>
            <button type="button" class="btn btn-outline" id="theme-light-btn">☀️ Light</button>
          </div>
        </div>

        <div class="card" style="margin-bottom: var(--space-lg);">
          <h3 class="card-title">Custom Colors</h3>
          <div class="form-grid">
            <label class="form-field">
              <span>Primary Color</span>
              <input type="color" id="field-color-primary" value="#4f46e5" />
            </label>
            <label class="form-field">
              <span>Accent Color</span>
              <input type="color" id="field-color-accent" value="#22d3ee" />
            </label>
          </div>
        </div>

        <div class="card" style="margin-bottom: var(--space-lg);">
          <h3 class="card-title">Font</h3>
          <div class="form-grid">
            <label class="form-field">
              <span>Primary Font</span>
              <select id="field-font-primary">
                <option value="'Segoe UI', system-ui, sans-serif">Segoe UI (Default)</option>
                <option value="'Poppins', sans-serif">Poppins</option>
                <option value="'Inter', sans-serif">Inter</option>
                <option value="'Roboto', sans-serif">Roboto</option>
              </select>
            </label>
          </div>
        </div>

        <div class="card">
          <h3 class="card-title">Preview</h3>
          <div style="margin-top: var(--space-md); display: flex; gap: var(--space-md); flex-wrap: wrap; align-items: center;">
            <button class="btn btn-primary">Primary Button</button>
            <button class="btn btn-outline">Outline Button</button>
            <span class="badge">Badge</span>
          </div>
          <div class="hero-buttons" style="justify-content: flex-start; margin-top: var(--space-lg);">
            <button type="button" class="btn btn-primary" id="theme-save-btn">💾 Save Theme</button>
            <button type="button" class="btn btn-outline" id="theme-reset-btn">↺ Reset to Default</button>
          </div>
        </div>
      </main>

    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/theme.js"></script>
</body>
</html>
